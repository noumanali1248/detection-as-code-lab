name: Detection-as-Code Validation & Deployment Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      rules_valid: ${{ steps.set-output.outputs.valid }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Sigma CLI
        run: |
          python -m pip install --upgrade pip
          pip install sigma-cli pyyaml

      - name: YAML Syntax Check
        run: |
          python - <<'PY'
          import glob, sys, yaml
          files = glob.glob('sigma_rules/*.yml')
          if not files:
              print("No .yml files found")
              sys.exit(1)
          failed = False
          for f in files:
              try:
                  with open(f) as fp:
                      yaml.safe_load(fp)
                  print(f'✅ VALID YAML: {f}')
              except Exception as e:
                  print(f'❌ INVALID YAML: {f}\n{e}')
                  failed = True
          sys.exit(1 if failed else 0)
          PY

      - name: Sigma Rule Validation
        run: |
          for file in sigma_rules/*.yml; do
            sigma check "$file" || exit 1
          done

      - name: Custom Rule Structure Validation
        run: |
          python - <<'PY'
          import glob, sys, yaml
          REQUIRED = ['title', 'id', 'description', 'logsource', 'detection']
          files = glob.glob('sigma_rules/*.yml')
          failed = False
          for f in files:
              data = yaml.safe_load(open(f))
              for field in REQUIRED:
                  if field not in data:
                      print(f'❌ Missing {field} in {f}')
                      failed = True
              if 'detection' in data and 'condition' not in data['detection']:
                  print(f'❌ Missing detection.condition in {f}')
                  failed = True
          sys.exit(1 if failed else 0)
          PY

      - name: Convert Sigma to ELK (EQL)
        run: |
          mkdir -p build/elk
          for rule in sigma_rules/*.yml; do
            base=$(basename "$rule" .yml)
            sigma convert -t eql --without-pipeline "$rule" > "build/elk/${base}.eql"
            if [ $? -ne 0 ]; then exit 1; fi
            echo "{\"type\":\"eql\",\"name\":\"$base\",\"language\":\"eql\",\"query\":$(jq -Rs . < "build/elk/${base}.eql"),\"severity\":\"medium\",\"enabled\":true}" > "build/elk/${base}.json"
          done

      - name: Convert Sigma to Wazuh XML (Custom)
        run: |
          mkdir -p build/wazuh
          python - <<'PY'
          import os, sys, yaml, glob, xml.etree.ElementTree as ET
          def sigma_to_wazuh(sigma_data):
              rule_id = str(sigma_data.get('id', '100000'))[:20]
              level = sigma_data.get('level', '5')
              if isinstance(level, int): level = str(level)
              level_map = {'low':'3','medium':'7','high':'10','critical':'15'}
              level = level_map.get(level.lower(), level)
              root = ET.Element("rule", id=rule_id, level=level)
              ET.SubElement(root, "description").text = sigma_data.get('description','')
              logsource = sigma_data.get('logsource', {})
              if 'product' in logsource:
                  ET.SubElement(root, "if_sid").text = "5710"
              detection = sigma_data.get('detection', {})
              if 'selection' in detection and isinstance(detection['selection'], dict):
                  for key in list(detection['selection'].keys())[:2]:
                      ET.SubElement(root, "match").text = f"{key} {detection['selection'][key]}"
              return ET.tostring(root, encoding='unicode')
          failed = False
          for f in glob.glob('sigma_rules/*.yml'):
              with open(f) as fp:
                  data = yaml.safe_load(fp)
              outpath = os.path.join('build/wazuh', os.path.basename(f).replace('.yml','.xml'))
              try:
                  with open(outpath,'w') as out:
                      out.write(sigma_to_wazuh(data))
                  print(f'✅ Converted {f}')
              except Exception as e:
                  print(f'❌ Failed {f}: {e}')
                  failed = True
          sys.exit(1 if failed else 0)
          PY

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: detection-rules-converted
          path: build/

      - name: Set output for validation status
        id: set-output
        run: echo "valid=true" >> $GITHUB_OUTPUT

  deploy-staging:
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging   # no approval required, auto-deploy after push to main
    steps:
      - name: Download converted rules
        uses: actions/download-artifact@v4
        with:
          name: detection-rules-converted
          path: build/

      - name: Deploy to ELK Staging
        run: |
          # Example using curl to Elasticsearch API (mock for demo)
          for rule in build/elk/*.json; do
            echo "Deploying $rule to ELK staging..."
            # curl -X POST "https://elk-staging:9200/..." -H "Content-Type: application/json" -d @"$rule"
          done

      - name: Deploy to Wazuh Staging
        run: |
          # Example SCP to Wazuh staging manager
          for rule in build/wazuh/*.xml; do
            echo "Deploying $rule to Wazuh staging..."
            # scp "$rule" user@wazuh-staging:/var/ossec/etc/rules/
          done

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - name: Download converted rules
        uses: actions/download-artifact@v4
        with:
          name: detection-rules-converted
          path: build/

      - name: Deploy to ELK Production
        run: |
          for rule in build/elk/*.json; do
            echo "Deploying $rule to ELK production..."
            # curl -X POST "https://elk-prod:9200/..." -H "Content-Type: application/json" -d @"$rule"
          done

      - name: Deploy to Wazuh Production
        run: |
          for rule in build/wazuh/*.xml; do
            echo "Deploying $rule to Wazuh production..."
            # scp "$rule" user@wazuh-prod:/var/ossec/etc/rules/
          done
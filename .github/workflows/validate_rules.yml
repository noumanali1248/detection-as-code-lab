name: Detection-as-Code Validation & Deployment Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Sigma CLI and Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sigma-cli pyyaml

      - name: YAML Syntax Check
        run: |
          python - <<'PY'
          import glob, sys, yaml
          files = glob.glob('sigma_rules/*.yml')
          if not files:
              print("No .yml files found in sigma_rules/")
              sys.exit(1)
          failed = False
          for f in files:
              try:
                  with open(f) as fp:
                      yaml.safe_load(fp)
                  print(f'✅ VALID YAML: {f}')
              except Exception as e:
                  print(f'❌ INVALID YAML: {f}\n{e}')
                  failed = True
          sys.exit(1 if failed else 0)
          PY

      - name: Sigma Rule Validation (sigma check)
        run: |
          for file in sigma_rules/*.yml; do
            echo "Checking $file"
            sigma check "$file" || exit 1
          done

      - name: Custom Rule Structure Validation
        run: |
          python - <<'PY'
          import glob, sys, yaml
          REQUIRED = ['title', 'id', 'description', 'logsource', 'detection']
          files = glob.glob('sigma_rules/*.yml')
          failed = False
          for f in files:
              data = yaml.safe_load(open(f))
              for field in REQUIRED:
                  if field not in data:
                      print(f'❌ Missing field: {field} in {f}')
                      failed = True
              if 'detection' in data and 'condition' not in data['detection']:
                  print(f'❌ Missing detection.condition in {f}')
                  failed = True
          sys.exit(1 if failed else 0)
          PY

      # Convert Sigma to ELK (EQL) using Python (no Sigma plugin issues)
      - name: Convert Sigma to ELK (EQL + JSON)
        run: |
          mkdir -p build/elk
          python - <<'PY'
          import os, sys, yaml, glob, json
          def sigma_to_eql(sigma_data):
              detection = sigma_data.get('detection', {})
              eql_parts = []
              if 'selection' in detection:
                  sel = detection['selection']
                  if isinstance(sel, dict):
                      for field, value in sel.items():
                          if isinstance(value, str):
                              if '*' in value:
                                  eql_parts.append(f'{field} : "{value}"')
                              else:
                                  eql_parts.append(f'{field} == "{value}"')
                          elif isinstance(value, list):
                              or_conds = [f'{field} == "{v}"' for v in value]
                              eql_parts.append('(' + ' or '.join(or_conds) + ')')
              eql_query = ' and '.join(eql_parts) if eql_parts else 'true'
              rule_json = {
                  "type": "eql",
                  "name": sigma_data.get('title', 'sigma_rule'),
                  "language": "eql",
                  "query": eql_query,
                  "severity": sigma_data.get('level', 'medium'),
                  "risk_score": 50,
                  "interval": "5m",
                  "enabled": True,
                  "description": sigma_data.get('description', ''),
                  "author": sigma_data.get('author', 'Detection Team')
              }
              return eql_query, rule_json
          failed = False
          for rule_file in glob.glob('sigma_rules/*.yml'):
              with open(rule_file) as f:
                  data = yaml.safe_load(f)
              base = os.path.basename(rule_file).replace('.yml', '')
              eql_query, rule_json = sigma_to_eql(data)
              try:
                  with open(f'build/elk/{base}.eql', 'w') as out:
                      out.write(eql_query)
                  with open(f'build/elk/{base}.json', 'w') as out:
                      json.dump(rule_json, out, indent=2)
                  print(f'✅ Converted {rule_file} -> ELK')
              except Exception as e:
                  print(f'❌ Failed {rule_file}: {e}')
                  failed = True
          sys.exit(1 if failed else 0)
          PY

      # Convert Sigma to Wazuh XML using custom Python
      - name: Convert Sigma to Wazuh XML
        run: |
          mkdir -p build/wazuh
          python - <<'PY'
          import os, sys, yaml, glob, xml.etree.ElementTree as ET
          def sigma_to_wazuh(sigma_data):
              rule_id = str(sigma_data.get('id', '100000'))[:20]
              level = sigma_data.get('level', '5')
              if isinstance(level, int): level = str(level)
              level_map = {'low':'3', 'medium':'7', 'high':'10', 'critical':'15'}
              level = level_map.get(level.lower(), level)
              root = ET.Element("rule", id=rule_id, level=level)
              ET.SubElement(root, "description").text = sigma_data.get('description', '')
              logsource = sigma_data.get('logsource', {})
              if 'product' in logsource:
                  ET.SubElement(root, "if_sid").text = "5710"
              detection = sigma_data.get('detection', {})
              if 'selection' in detection and isinstance(detection['selection'], dict):
                  for key in list(detection['selection'].keys())[:2]:
                      ET.SubElement(root, "match").text = f"{key} {detection['selection'][key]}"
              return ET.tostring(root, encoding='unicode')
          failed = False
          for f in glob.glob('sigma_rules/*.yml'):
              with open(f) as fp:
                  data = yaml.safe_load(fp)
              outpath = os.path.join('build/wazuh', os.path.basename(f).replace('.yml', '.xml'))
              try:
                  with open(outpath, 'w') as out:
                      out.write(sigma_to_wazuh(data))
                  print(f'✅ Converted {f} -> Wazuh')
              except Exception as e:
                  print(f'❌ Failed {f}: {e}')
                  failed = True
          sys.exit(1 if failed else 0)
          PY

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: detection-rules-converted
          path: build/

  deploy-staging:
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - name: Download converted rules
        uses: actions/download-artifact@v4
        with:
          name: detection-rules-converted
          path: build/

      - name: Deploy to ELK Staging
        run: |
          for rule in build/elk/*.json; do
            echo "Deploying $rule to ELK staging..."
            # Replace with actual curl to Elasticsearch API:
            # curl -X POST "https://elk-staging:9200/..." -H "Content-Type: application/json" -d @"$rule"
          done

      - name: Deploy to Wazuh Staging
        run: |
          for rule in build/wazuh/*.xml; do
            echo "Deploying $rule to Wazuh staging..."
            # Replace with actual scp/ssh to Wazuh manager:
            # scp "$rule" wazuh-staging:/var/ossec/etc/rules/
          done

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
     
    steps:
      - name: Download converted rules
        uses: actions/download-artifact@v4
        with:
          name: detection-rules-converted
          path: build/

      - name: Deploy to ELK Production
        run: |
          for rule in build/elk/*.json; do
            echo "Deploying $rule to ELK production..."
            # curl -X POST "https://elk-prod:9200/..." -H "Content-Type: application/json" -d @"$rule"
          done

      - name: Deploy to Wazuh Production
        run: |
          for rule in build/wazuh/*.xml; do
            echo "Deploying $rule to Wazuh production..."
            # scp "$rule" wazuh-prod:/var/ossec/etc/rules/
          done
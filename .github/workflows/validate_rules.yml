name: Detection-as-Code Validation Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  validate:

    runs-on: ubuntu-latest

    steps:

    # STEP 1: Checkout repo
    - name: Checkout Repository
      uses: actions/checkout@v3

    # STEP 2: Setup Python
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # STEP 3: Install dependencies
    - name: Install Sigma + tools
      run: |
        pip install sigma-cli sigma-backend-elasticsearch sigma-backend-wazuh pyyaml

    # STEP 4: Validate YAML syntax
    - name: YAML Syntax Check
      run: |
        python - <<'PY'
        import glob
        import sys
        import yaml

        files = glob.glob('sigma_rules/*.yml')
        failed = False

        for f in files:
            try:
                yaml.safe_load(open(f))
                print(f'VALID YAML: {f}')
            except Exception as e:
                print(f'INVALID YAML: {f}')
                print(e)
                failed = True

        if failed:
            sys.exit(1)
        PY

    # STEP 5: Sigma rule validation
    - name: Sigma Rule Validation
      run: |
        for file in sigma_rules/*.yml; do
          echo "Checking $file"
          sigma check "$file" || exit 1
        done

    # STEP 6: SOC rule schema validation
    - name: Rule Structure Validation
      run: |
        python - <<'PY'
        import glob
        import sys
        import yaml

        REQUIRED_FIELDS = [
            'title',
            'id',
            'description',
            'logsource',
            'detection'
        ]

        files = glob.glob('sigma_rules/*.yml')
        failed = False

        for f in files:
            data = yaml.safe_load(open(f))

            print(f'\nChecking {f}')

            for field in REQUIRED_FIELDS:
                if field not in data:
                    print(f'Missing field: {field} in {f}')
                    failed = True

            if 'id' in data:
                if not isinstance(data['id'], (str, int)):
                    print(f'Invalid ID type in {f}')
                    failed = True

            if 'detection' in data:
                if 'condition' not in data['detection']:
                    print(f'Missing detection.condition in {f}')
                    failed = True

        if failed:
            print('\nRULE VALIDATION FAILED')
            sys.exit(1)

        print('\nALL RULES PASSED')
        PY

    # STEP 7: Convert Sigma → ELK
    - name: Convert Sigma to ELK
      run: |
        mkdir -p build/elk
        sigma convert -t elasticsearch -p ecs sigma_rules/*.yml > build/elk/elk_rules.json

    # STEP 8: Convert Sigma → Wazuh
    - name: Convert Sigma to Wazuh
      run: |
        mkdir -p build/wazuh
        sigma convert -t wazuh sigma_rules/*.yml > build/wazuh/wazuh_rules.xml

    # STEP 9: Upload artifacts
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: detection-rules
        path: build/
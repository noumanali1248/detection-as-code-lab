title: Suspicious PowerShell Encoded Command
id: 7b8a4f2c-1e3d-4a5b-9c7d-8e6f2a1b3c4d   # Use a unique UUID (example)
description: Detects PowerShell execution with an encoded command, a technique commonly used to obfuscate malicious scripts and evade simple string-based detection.
author: Nouman Ali
date: 2025-05-01
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://docs.microsoft.com/en-us/powershell/scripting/learn/remoting/powershell-encoded-command
tags:
  - attack.execution
  - attack.t1059.001
  - attack.t1027
logsource:
  product: windows
  category: process_creation
detection:
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_encoded:
    CommandLine|contains|all:
      - '-EncodedCommand'
      - '='
  condition: all of selection_*
level: high
falsepositives:
  - Legitimate administrative scripts that intentionally use encoded commands (e.g., deployment tools).
  - Some third-party software that invokes PowerShell with encoded arguments.